name: Build Windows

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build executable and installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-build.txt

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-build.txt

      - name: Validate project files
        run: python -B scripts/validate_project.py

      - name: Run DOCX smoke test
        run: python -B scripts/smoke_generate.py

      - name: Build Windows executable
        run: pyinstaller --noconfirm --clean GeradorDiarioObra.spec

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeradorDiarioObra-exe
          path: dist/GeradorDiarioObra.exe
          if-no-files-found: error

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build Windows installer
        shell: pwsh
        run: |
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (!(Test-Path $iscc)) {
            $iscc = "${env:ProgramFiles}\Inno Setup 6\ISCC.exe"
          }
          if (!(Test-Path $iscc)) {
            throw "ISCC.exe nao encontrado."
          }
          & $iscc assets\instalador_gerador_diario.iss

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: GeradorDiarioObra-installer
          path: assets/instalador/*.exe
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $installer = Get-ChildItem assets\instalador\*.exe | Select-Object -First 1
          gh release create $env:GITHUB_REF_NAME `
            dist\GeradorDiarioObra.exe `
            $installer.FullName `
            --generate-notes
